<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス案内</title>

<style>
body {
  background: black;
  color: #00ff88;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  font-size: 32px;
}

/* ボタン */
button {
  padding: 15px 25px;
  margin: 8px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
}

/* 時刻入力 */
input {
  padding: 15px;
  font-size: 22px;
  width: 180px;
  border-radius: 10px;
  border: none;
}

/* 結果 */
#results {
  margin-top: 30px;
  font-size: 24px;
}

#results div {
  margin: 10px 0;
  padding: 12px;
  background: #111;
  border-radius: 10px;
}

/* 状態表示 */
.next {
  color: yellow;
  font-weight: bold;
}

.past {
  color: gray;
}

/* スマホ対応 */
@media (max-width: 600px) {
  h1 { font-size: 28px; }
  button { font-size: 22px; padding: 18px 28px; }
  input { font-size: 24px; }
  #results { font-size: 26px; }
}
</style>
</head>

<body>

<h1>シャトルバス案内</h1>

<button onclick="setDirection('go')">行き</button>
<button onclick="setDirection('back')">帰り</button>

<p id="directionText">現在：行き</p>

<input type="time" id="searchTime">
<button onclick="search()">検索</button>

<div id="results"></div>

<script>
const timetable = {
  go: ["12:10","13:00","14:00"],
  back: ["19:30","20:15","20:45"]
};

// 随時運行
const anytime = {
  go: { start: "08:20", end: "12:00" },
  back: { start: "16:00", end: "19:00" }
};

let currentDirection = "go";

function setDirection(dir) {
  currentDirection = dir;
  document.getElementById("directionText").textContent =
    "現在：" + (dir === "go" ? "行き" : "帰り");
}

// 時刻→分
function toMinutes(time) {
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function search() {
  const input = document.getElementById("searchTime").value;
  if (!input) return;

  const inputMin = toMinutes(input);
  const list = timetable[currentDirection];
  const range = anytime[currentDirection];

  let output = "";

  // 🟡 随時運行（検索時間ベース）
  if (
    inputMin >= toMinutes(range.start) &&
    inputMin <= toMinutes(range.end)
  ) {
    output += `<div class="next">
    ● 随時運行（${range.start}〜${range.end}）
    </div>`;
  }

  // 定期便
  let nextFound = false;

  list.forEach(t => {
    const tMin = toMinutes(t);
    let label = `● ${currentDirection==="go"?"行き":"帰り"} ${t}`;

    if (tMin < inputMin) {
      label = `<span class="past">${label}（発車済み）</span>`;
    } else if (!nextFound) {
      label = `<span class="next">${label}（次のバス）</span>`;
      nextFound = true;
    }

    output += `<div>${label}</div>`;
  });

  if (output === "") {
    output = "該当なし";
  }

  document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス案内（CSV対応＋土曜運休考慮）</title>
<style>
body {
  background: black;
  color: #00ff88;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}
h1 { font-size: 36px; margin-bottom: 20px; }
button { padding: 18px 30px; margin: 8px; font-size: 20px; border-radius: 10px; border: none; cursor: pointer; }
input[type="time"], input[type="file"] { padding: 15px; font-size: 22px; border-radius: 10px; border: none; }
#directionText { font-size: 24px; margin: 15px 0; }
#results { margin-top: 25px; font-size: 24px; }
#results div { margin: 12px 0; padding: 12px; background: #111; border-radius: 12px; }
@media (max-width: 600px) {
  h1 { font-size: 30px; }
  button { font-size: 22px; padding: 20px 32px; }
  input[type="time"], input[type="file"] { font-size: 24px; width: 200px; }
  #results { font-size: 26px; }
}
</style>
</head>
<body>

<h1>シャトルバス案内（CSV対応＋土曜運休考慮）</h1>

<button onclick="setDirection('go')">行き</button>
<button onclick="setDirection('back')">帰り</button>

<p id="directionText">現在：行き</p>

<input type="time" id="searchTime">
<button onclick="search()">検索</button>
<br><br>
<input type="file" id="csvFile" accept=".csv" onchange="loadCSV(event)">

<div id="results"></div>

<script>
let timetable = { go: [], back: [] };
let anytime = { go: null, back: null };
let currentDirection = "go";
let currentDay = "weekday"; // 今はweekday固定。必要なら曜日選択UI追加可能

// 行き／帰り切り替え
function setDirection(dir) {
  currentDirection = dir;
  document.getElementById("directionText").textContent =
    "現在：" + (dir === "go" ? "行き" : "帰り");
}

// 時刻を分に変換
function toMinutes(time) {
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

// 分を時刻文字列に変換
function toTimeStr(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
}

// CSV読み込み
function loadCSV(event) {
  const file = event.target.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.trim().split("\n");
    timetable = { go: [], back: [] };
    anytime = { go: null, back: null };

    for (let i = 1; i < lines.length; i++) { // 1行目はヘッダー
      const row = lines[i].split(/\t|,/);
      const [type, day, mode, start, end, time, stop] = row;
      if (!type) continue;

      // 土曜運休の便は除外、平日は stop 無視
      const isSaturdayStop = (currentDay === "saturday" && stop);
      if (isSaturdayStop) continue;

      if (mode === "normal") {
        if (time) timetable[type].push(time.trim());
      } else if (mode === "anytime") {
        anytime[type] = { start: start.trim(), end: end.trim() };
      }
    }

    // 時刻を昇順に
    timetable.go.sort();
    timetable.back.sort();
    alert("CSV読み込み完了！");
  };
  reader.readAsText(file);
}

// 検索
function search() {
  const input = document.getElementById("searchTime").value;
  const results = document.getElementById("results");
  if (!input) {
    results.innerHTML = "時間を入力してね";
    return;
  }
  const inputMin = toMinutes(input);
  let output = "";

  // 通常運行
  timetable[currentDirection].forEach(t => {
    if (toMinutes(t) >= inputMin) {
      output += `<div>● ${currentDirection === "go" ? "行き" : "帰り"} ${t}</div>`;
    }
  });

  // 随時運行
  const range = anytime[currentDirection];
  if (range) {
    const startMin = toMinutes(range.start);
    const endMin = toMinutes(range.end);
    if (inputMin >= startMin && inputMin <= endMin) {
      const remaining = endMin - inputMin;
      output += `<div style="color: yellow;">
● 随時運行（あと ${remaining} 分まで運行）
</div>`;
    }
  }

  if (output === "") output = "該当なし";
  results.innerHTML = output;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス案内</title>
<style>
  body {
    background: black;
    color: #00ff66;
    font-family: sans-serif;
    text-align: center;
  }
  button {
    font-size: 20px;
    margin: 10px;
    padding: 10px 20px;
  }
  select, button {
    font-size: 18px;
  }
  .result {
    margin-top: 20px;
    font-size: 20px;
  }
</style>
</head>
<body>

<h1>シャトルバス案内</h1>

<button onclick="setMode('go')">行き</button>
<button onclick="setMode('back')">帰り</button>

<h2 id="clock"></h2>
<h2 id="status"></h2>

<select id="timeSelect"></select>
<button onclick="search()">検索</button>

<div class="result" id="result"></div>
<div class="result" id="countdown"></div>

<script>
let mode = "go";
let selectedBus = null;

// 定期便
const goTimes = ["12:10", "13:00", "14:00"];
const backTimes = ["19:30", "20:15", "20:45"];

// 初期化
function init() {
  const select = document.getElementById("timeSelect");
  for (let h = 8; h <= 21; h++) {
    for (let m = 0; m < 60; m += 5) {
      const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      const option = document.createElement("option");
      option.value = time;
      option.textContent = time;
      select.appendChild(option);
    }
  }
}

function setMode(m) {
  mode = m;
}

// 現在時刻（分）
function getNowMinutes() {
  const now = new Date();
  return now.getHours()*60 + now.getMinutes();
}

// HH:MM → 分
function toMinutes(t) {
  const [h,m] = t.split(":").map(Number);
  return h*60 + m;
}

// 範囲チェック
function isInTimeRange(start, end, now) {
  return now >= start && now <= end;
}

// 時計
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString();
  document.getElementById("clock").textContent = time;

  const min = getNowMinutes();

  if (min > 21*60) {
    document.getElementById("status").textContent = "本日の運行終了";
  } else {
    document.getElementById("status").textContent = "";
  }
}
setInterval(updateClock, 1000);

// 検索
function search() {
  const selectedTime = document.getElementById("timeSelect").value;
  const selectedMin = toMinutes(selectedTime);
  const now = getNowMinutes();

  let result = [];

  // 🟢 行き随時
  if (mode === "go" && isInTimeRange(8*60+20, 12*60, now)) {
    result.push("🟢 行き 随時運行（8:20〜12:00）");
  }

  // 🔵 帰り随時
  if (mode === "back" && isInTimeRange(16*60, 19*60, now)) {
    result.push("🔵 帰り 随時運行（16:00〜19:00）");
  }

  // 定期便
  const times = mode === "go" ? goTimes : backTimes;

  times.forEach(t => {
    const tMin = toMinutes(t);
    if (tMin >= selectedMin) {
      result.push((mode==="go"?"🟢 行き ":"🔵 帰り ") + t);
    }
  });

  document.getElementById("result").innerHTML = result.join("<br>");

  // カウント対象（次の便）
  selectedBus = null;
  for (let t of times) {
    if (toMinutes(t) >= now) {
      selectedBus = t;
      break;
    }
  }
}

// カウントダウン
function updateCountdown() {
  if (!selectedBus) return;

  const now = new Date();
  const nowMin = getNowMinutes();
  const busMin = toMinutes(selectedBus);

  let diff = busMin - nowMin;

  if (diff <= 0) {
    selectedBus = null;
    document.getElementById("countdown").textContent = "";
    return;
  }

  const min = diff;
  document.getElementById("countdown").textContent =
    `次のバスまであと ${min} 分`;
}
setInterval(updateCountdown, 1000);

// 実行
init();
</script>

</body>
</html>

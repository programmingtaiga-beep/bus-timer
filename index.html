<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャトルバス表示</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: #0f0;
}

h1 { font-size: 6vw; }

#time { font-size: 10vw; margin: 20px; }
#next { font-size: 8vw; margin: 20px; }

button {
  font-size: 5vw;
  margin: 10px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h1>シャトルバス案内</h1>

<div>
  <button onclick="setMode('go')">行き</button>
  <button onclick="setMode('back')">帰り</button>
</div>

<div id="time"></div>
<div id="next"></div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUWfZ4fmfQIBpe1CM0d6ASi3qWoAB2RuZXWPNoKtxCdYlj9VFgcwB5-cobREUMeaQkzBGW4VGOUlk6/pub?gid=0&single=true&output=csv";

let timetable = [];
let currentMode = "go";

// CSV読み込み
async function loadCSV() {
  const res = await fetch(csvUrl);
  const text = await res.text();

  timetable = text.split("\n").slice(1).map(row => {
    const [type, day, mode, start, end, time, stop] =
      row.split(",").map(v => v.trim());

    return { type, day, mode, start, end, time, stop };
  });
}

// モード切替
function setMode(mode) {
  currentMode = mode;
}

// 次のバス取得（完全版）
function getNextBus() {
  const now = new Date();
  const day = now.getDay();

  let dayType = "weekday";
  if (day === 6) dayType = "saturday";
  if (day === 0) dayType = "holiday";

  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  const filtered = timetable
    .filter(t => t.type === currentMode && t.day === dayType)
    .map(t => ({
      ...t,
      time: t.time?.trim(),
      start: t.start?.trim(),
      end: t.end?.trim(),
      stop: t.stop?.trim()
    }));

  // 時刻順に並び替え（超重要）
  filtered.sort((a, b) => (a.time || "").localeCompare(b.time || ""));

  // ===== ① 随時運行チェック =====
  for (let t of filtered) {
    if (t.stop === "stop") continue;

    if (t.mode === "anytime" && t.start && t.end) {
      const [sh, sm] = t.start.split(":").map(Number);
      const [eh, em] = t.end.split(":").map(Number);

      const startMin = sh * 60 + sm;
      const endMin = eh * 60 + em;

      if (currentMinutes >= startMin && currentMinutes <= endMin) {
        return { type: "anytime", end: t.end };
      }
    }
  }

  // ===== ② 通常便 =====
  for (let t of filtered) {
    if (t.stop === "stop") continue;

    if (t.mode === "normal" && t.time) {
      const [h, m] = t.time.split(":").map(Number);
      const busMin = h * 60 + m;

      if (busMin > currentMinutes) {
        return { type: "normal", time: t.time };
      }
    }
  }

  return { type: "end" };
}

// 表示更新
function updateDisplay() {
  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString("ja-JP");

  const next = getNextBus();

  const el = document.getElementById("next");

  if (next.type === "normal") {
    el.textContent = `次のバス ${next.time}`;
  } else if (next.type === "anytime") {
    el.textContent = `随時運行中（〜${next.end}）`;
  } else {
    el.textContent = "本日の運行終了";
  }
}

// 初期化
async function init() {
  await loadCSV();
  setInterval(updateDisplay, 1000);
}

init();
</script>

</body>
</html>

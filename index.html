<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス時刻案内</title>

<style>
body {
  background: black;
  color: #00ff88;
  font-family: sans-serif;
  margin: 0;
  text-align: center;
}

/* ===== メイン表示 ===== */
#mainDisplay {
  position: fixed;
  top: 28%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}

/* 現在時刻 */
#nowTime {
  font-size: 26px;
  color: #ccc;
}

/* 方向表示 */
#directionDisplay {
  font-size: 24px;
  margin: 10px 0;
  font-weight: bold;
}

.go { color: #00ff88; }
.back { color: #00aaff; }

/* タイマー */
#nextBusTimer {
  font-size: 50px;
  font-weight: bold;
  color: #ffcc00;
  line-height: 1.4;
}

/* 運休 */
.holiday {
  font-size: 60px;
  color: red;
}

/* ===== 操作 ===== */
#controls {
  position: fixed;
  top: 60%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
}

button {
  padding: 18px 28px;
  margin: 8px;
  font-size: 20px;
  border-radius: 14px;
  border: none;
}

input[type="time"] {
  padding: 16px;
  font-size: 20px;
  width: 180px;
  border-radius: 12px;
  border: none;
}

#results {
  margin-top: 15px;
  max-height: 180px;
  overflow-y: auto;
}

#results div {
  margin: 8px 15px;
  padding: 14px;
  background: #111;
  border-radius: 12px;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- ===== メイン ===== -->
<div id="mainDisplay">
  <div id="nowTime"></div>
  <div id="directionDisplay" class="go">行き</div>
  <div id="nextBusTimer">読み込み中...</div>
</div>

<!-- ===== 操作 ===== -->
<div id="controls">
  <button onclick="setDirection('go')">行き</button>
  <button onclick="setDirection('back')">帰り</button>

  <div>
    <input type="time" id="searchTime">
    <button onclick="search()">検索</button>
  </div>

  <div id="results"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUWfZ4fmfQIBpe1CM0d6ASi3qWoAB2RuZXWPNoKtxCdYlj9VFgcwB5-cobREUMeaQkzBGW4VGOUlk6/pub?output=csv";

let timetable = { go: [], back: [] };
let anytime = { go: null, back: null };
let currentDirection = "go";

/* 祝日 */
function isHoliday(date) {
  const holidays = ["01-01","02-11","04-29","05-03","05-04","05-05","11-03","11-23"];
  const m = ("0"+(date.getMonth()+1)).slice(-2);
  const d = ("0"+date.getDate()).slice(-2);
  return holidays.includes(`${m}-${d}`);
}

function toMinutes(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

async function loadCSV(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const lines = text.trim().split("\n");

  for(let i=1;i<lines.length;i++){
    const row = lines[i].split(/\t|,/);
    const [type,day,mode,start,end,time,stop]=row;

    if(mode==="normal" && time){
      timetable[type].push({
        time: time.trim(),
        isSaturdayStop: (day==="saturday" && stop)
      });
    }

    if(mode==="anytime"){
      anytime[type]={start,end};
    }
  }

  timetable.go.sort((a,b)=>toMinutes(a.time)-toMinutes(b.time));
  timetable.back.sort((a,b)=>toMinutes(a.time)-toMinutes(b.time));
}

/* 現在時刻 */
function updateNowTime(){
  const now=new Date();
  document.getElementById("nowTime").textContent =
    "現在時刻 " + now.toLocaleTimeString();
}

/* 方向表示 */
function updateDirectionDisplay(){
  const el = document.getElementById("directionDisplay");
  if(currentDirection==="go"){
    el.textContent="行き";
    el.className="go";
  } else {
    el.textContent="帰り";
    el.className="back";
  }
}

/* タイマー */
function updateTimer(){
  const now=new Date();
  const day=now.getDay();

  if(day===0 || isHoliday(now)){
    document.getElementById("nextBusTimer").innerHTML =
      '<div class="holiday">本日運休</div>';
    return;
  }

  const isSaturday=(day===6);
  const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  const range=anytime[currentDirection];
  if(range){
    const s=toMinutes(range.start)*60;
    const e=toMinutes(range.end)*60;
    if(nowSec>=s && nowSec<=e){
      document.getElementById("nextBusTimer").textContent="随時運行中";
      return;
    }
  }

  for(const item of timetable[currentDirection]){
    if(isSaturday && item.isSaturdayStop) continue;

    const t=toMinutes(item.time)*60;
    if(t>=nowSec){
      const diff=t-nowSec;
      const m=Math.floor(diff/60);
      const s=diff%60;

      document.getElementById("nextBusTimer").textContent =
        `${item.time} 発まであと ${m}分${s}秒`;
      return;
    }
  }

  document.getElementById("nextBusTimer").textContent="本日の便は終了";
}

function setDirection(d){
  currentDirection=d;
  updateDirectionDisplay();
}

function search(){
  const input=document.getElementById("searchTime").value;
  const results=document.getElementById("results");
  if(!input){results.innerHTML="時間を入力";return;}

  const inputMin=toMinutes(input);
  const limit=inputMin+120;

  let out="";

  timetable[currentDirection].forEach(item=>{
    const t=toMinutes(item.time);
    if(t>=inputMin&&t<=limit){
      out+=`<div>${item.time}</div>`;
    }
  });

  results.innerHTML=out||"該当なし";
}

window.onload=async()=>{
  await loadCSV();
  updateDirectionDisplay();
  updateTimer();
  updateNowTime();
  setInterval(updateTimer,1000);
  setInterval(updateNowTime,1000);
};
</script>

</body>
</html>

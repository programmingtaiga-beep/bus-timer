<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス案内</title>
<style>
body {
  background: black;
  color: #00ff88;
  font-family: sans-serif;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 5px;
}

input {
  padding: 10px;
  font-size: 16px;
  width: 120px;
}

#results {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>シャトルバス案内</h1>

<button onclick="setDirection('go')">行き</button>
<button onclick="setDirection('back')">帰り</button>

<p id="directionText">現在：行き</p>

<input type="time" id="searchTime">
<button onclick="search()">検索</button>

<div id="results"></div>

<script>
// 時刻データ（必要に応じて増やしてOK）
const timetable = {
  go: ["08:00","08:30","09:00","09:30","10:00","10:30"],
  back: ["19:30","20:15","20:45"]
};

// 随時運行の時間帯
const anytime = {
  go: { start: "08:00", end: "17:00" },
  back: { start: "17:00", end: "21:00" }
};

let currentDirection = "go";

// 行き帰り切り替え
function setDirection(dir) {
  currentDirection = dir;
  document.getElementById("directionText").textContent =
    "現在：" + (dir === "go" ? "行き" : "帰り");
}

// 時刻を分に変換
function toMinutes(time) {
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

// 検索処理
function search() {
  const input = document.getElementById("searchTime").value;
  const results = document.getElementById("results");

  if (!input) {
    results.innerHTML = "時間を入力してね";
    return;
  }

  const inputMin = toMinutes(input);
  const list = timetable[currentDirection];

  let output = "";

  // 通常ダイヤ
  list.forEach(t => {
    if (toMinutes(t) >= inputMin) {
      output += `<div>● ${currentDirection === "go" ? "行き" : "帰り"} ${t}</div>`;
    }
  });

  // 随時運行判定
  const range = anytime[currentDirection];
  if (
    inputMin >= toMinutes(range.start) &&
    inputMin <= toMinutes(range.end)
  ) {
    output += `<div style="color: yellow;">● 随時運行あり</div>`;
  }

  // 何もない場合
  if (output === "") {
    output = "該当なし";
  }

  results.innerHTML = output;
}
</script>

</body>
</html>

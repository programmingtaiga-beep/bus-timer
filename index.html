<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス案内</title>
<style>
body {
  background: black;
  color: #00ff88;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* タイトル */
h1 {
  font-size: 36px;
  margin-bottom: 20px;
}

/* 行き帰りボタン */
button {
  padding: 18px 30px;
  margin: 8px;
  font-size: 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* 入力欄 */
input {
  padding: 15px;
  font-size: 22px;
  width: 180px;
  border-radius: 10px;
  border: none;
}

/* 現在表示 */
#directionText {
  font-size: 24px;
  margin: 15px 0;
}

/* 検索結果 */
#results {
  margin-top: 25px;
  font-size: 24px;
}

/* 1行ごとの結果 */
#results div {
  margin: 12px 0;
  padding: 12px;
  background: #111;
  border-radius: 12px;
}

/* スマホ最適化 */
@media (max-width: 600px) {
  h1 {
    font-size: 30px;
  }

  button {
    font-size: 22px;
    padding: 20px 32px;
  }

  input {
    font-size: 24px;
    width: 200px;
  }

  #results {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<h1>シャトルバス案内</h1>

<button onclick="setDirection('go')">行き</button>
<button onclick="setDirection('back')">帰り</button>

<p id="directionText">現在：行き</p>

<input type="time" id="searchTime">
<button onclick="search()">検索</button>

<div id="results"></div>

<script>
// 時刻データ
const timetable = {
  go: ["08:00","08:30","09:00","09:30","10:00","10:30"],
  back: ["19:30","20:15","20:45"]
};

// 随時運行の時間帯
const anytime = {
  go: { start: "08:00", end: "17:00" },
  back: { start: "17:00", end: "21:00" }
};

let currentDirection = "go";

// 行き帰り切り替え
function setDirection(dir) {
  currentDirection = dir;
  document.getElementById("directionText").textContent =
    "現在：" + (dir === "go" ? "行き" : "帰り");
}

// 時刻を分に変換
function toMinutes(time) {
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

// 分を時刻文字列に変換
function toTimeStr(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
}

// 検索処理
function search() {
  const input = document.getElementById("searchTime").value;
  const results = document.getElementById("results");

  if (!input) {
    results.innerHTML = "時間を入力してね";
    return;
  }

  const inputMin = toMinutes(input);
  const list = timetable[currentDirection];

  let output = "";

  // 通常ダイヤ
  list.forEach(t => {
    if (toMinutes(t) >= inputMin) {
      output += `<div>● ${currentDirection === "go" ? "行き" : "帰り"} ${t}</div>`;
    }
  });

  // 随時運行判定
  const range = anytime[currentDirection];
  if (inputMin >= toMinutes(range.start) && inputMin <= toMinutes(range.end)) {
    const remaining = toMinutes(range.end) - inputMin;
    output += `<div style="color: yellow;">
● 随時運行（あと ${remaining} 分まで運行）
</div>`;
  }

  // 何もない場合
  if (output === "") {
    output = "該当なし";
  }

  results.innerHTML = output;
}
</script>

</body>
</html>

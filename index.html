<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シャトルバス案内</title>

<style>
body {
  background: black;
  color: #00ff88;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 10px;
}

/* 上部固定バー */
#topBar {
  position: sticky;
  top: 0;
  background: black;
  padding: 10px;
  z-index: 1000;
}

/* 現在時刻 */
#nowTime {
  font-size: 18px;
  color: #ccc;
}

/* タイマー */
#nextBusTimer {
  font-size: 30px;
  color: #ffcc00;
  font-weight: bold;
  margin: 10px 0;
}

h1 { font-size: 28px; }

button {
  padding: 14px 20px;
  margin: 5px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

input[type="time"] {
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

/* カードUI */
#results div {
  margin: 10px;
  padding: 14px;
  background: #111;
  border-radius: 12px;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="topBar">
  <div id="nowTime"></div>
  <div id="nextBusTimer">読み込み中...</div>
</div>

<h1>シャトルバス案内</h1>

<button onclick="setDirection('go')">行き</button>
<button onclick="setDirection('back')">帰り</button>

<p id="directionText">現在：行き</p>

<input type="time" id="searchTime">
<button onclick="search()">検索</button>

<div id="results"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUWfZ4fmfQIBpe1CM0d6ASi3qWoAB2RuZXWPNoKtxCdYlj9VFgcwB5-cobREUMeaQkzBGW4VGOUlk6/pub?output=csv";

let timetable = { go: [], back: [] };
let anytime = { go: null, back: null };
let currentDirection = "go";

// 祝日判定（簡易）
function isHoliday(date) {
  const holidays = ["01-01","02-11","04-29","05-03","05-04","05-05","11-03","11-23"];
  const m = ("0"+(date.getMonth()+1)).slice(-2);
  const d = ("0"+date.getDate()).slice(-2);
  return holidays.includes(`${m}-${d}`);
}

// 時刻変換
function toMinutes(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

// CSV読み込み
async function loadCSV(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const lines = text.trim().split("\n");

  for(let i=1;i<lines.length;i++){
    const row = lines[i].split(/\t|,/);
    const [type,day,mode,start,end,time,stop]=row;

    if(mode==="normal" && time){
      timetable[type].push({
        time: time.trim(),
        isSaturdayStop: (day==="saturday" && stop)
      });
    }
    if(mode==="anytime"){
      anytime[type]={start,end};
    }
  }

  timetable.go.sort((a,b)=>toMinutes(a.time)-toMinutes(b.time));
  timetable.back.sort((a,b)=>toMinutes(a.time)-toMinutes(b.time));
}

// 方向切替
function setDirection(d){
  currentDirection=d;
  document.getElementById("directionText").textContent =
    "現在：" + (d==="go"?"行き":"帰り");
}

// 現在時刻表示
function updateNowTime(){
  const now=new Date();
  const t=now.toLocaleTimeString();
  document.getElementById("nowTime").textContent="現在時刻："+t;
}

// タイマー
function updateTimer(){
  const now=new Date();
  const day=now.getDay();

  // 日曜・祝日
  if(day===0 || isHoliday(now)){
    document.getElementById("nextBusTimer").textContent="本日運休";
    return;
  }

  const isSaturday=(day===6);

  const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  // 随時運行
  const range=anytime[currentDirection];
  if(range){
    const s=toMinutes(range.start)*60;
    const e=toMinutes(range.end)*60;
    if(nowSec>=s && nowSec<=e){
      document.getElementById("nextBusTimer").textContent="随時運行中";
      return;
    }
  }

  // 次の便
  for(const item of timetable[currentDirection]){
    if(isSaturday && item.isSaturdayStop) continue;

    const t=toMinutes(item.time)*60;
    if(t>=nowSec){
      const diff=t-nowSec;
      const m=Math.floor(diff/60);
      const s=diff%60;

      document.getElementById("nextBusTimer").textContent =
        `次のバス（${item.time}）まであと ${m}分${s}秒`;
      return;
    }
  }

  document.getElementById("nextBusTimer").textContent="本日の便は終了";
}

// 検索
function search(){
  const input=document.getElementById("searchTime").value;
  const results=document.getElementById("results");
  if(!input){results.innerHTML="時間を入力";return;}

  const inputMin=toMinutes(input);
  const limit=inputMin+120;
  const now=new Date();
  const isSaturday=(now.getDay()===6);

  let out="";

  const range=anytime[currentDirection];
  if(range){
    if(inputMin>=toMinutes(range.start)&&inputMin<=toMinutes(range.end)){
      out+=`<div style="color:yellow;">● 随時運行（${range.start}〜${range.end}）</div>`;
    }
  }

  timetable[currentDirection].forEach(item=>{
    const t=toMinutes(item.time);
    if(t>=inputMin&&t<=limit){
      const warn=(isSaturday&&item.isSaturdayStop)?"（土曜運休）":"";
      out+=`<div>● ${item.time} ${warn}</div>`;
    }
  });

  results.innerHTML=out||"該当なし";
}

// 初期化
window.onload=async()=>{
  await loadCSV();
  updateTimer();
  updateNowTime();
  setInterval(updateTimer,1000);
  setInterval(updateNowTime,1000);
};
</script>

</body>
</html>
